<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .bg { fill: #0D1117; }
    .label { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #FF2D55; }
    .sub   { font: 700 10px "Segoe UI", Arial, sans-serif; fill: #888; letter-spacing:1px; }
    .badge-pill {
      rx: 6; ry: 6;
      height: 26px;
    }
    .ft { font: 700 10px "Segoe UI", Arial, sans-serif; fill: #fff; }
    .logo-bg { height: 26px; width: 26px; }

    /* Section rows - fade + slide up, staggered */
    .s0  { animation: rise .55s cubic-bezier(.22,.61,.36,1) both .10s; }
    .s1  { animation: rise .55s cubic-bezier(.22,.61,.36,1) both .28s; }
    .s2  { animation: rise .55s cubic-bezier(.22,.61,.36,1) both .46s; }
    .s3  { animation: rise .55s cubic-bezier(.22,.61,.36,1) both .64s; }
    .s4  { animation: rise .55s cubic-bezier(.22,.61,.36,1) both .82s; }
    .s5  { animation: rise .55s cubic-bezier(.22,.61,.36,1) both 1.00s; }
    .s6  { animation: rise .55s cubic-bezier(.22,.61,.36,1) both 1.18s; }
    .s7  { animation: rise .55s cubic-bezier(.22,.61,.36,1) both 1.36s; }
    .s8  { animation: rise .55s cubic-bezier(.22,.61,.36,1) both 1.54s; }
    .s9  { animation: rise .55s cubic-bezier(.22,.61,.36,1) both 1.72s; }
    .s10 { animation: rise .55s cubic-bezier(.22,.61,.36,1) both 1.90s; }

    @keyframes rise {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0);    }
    }

    /* Shimmer on the divider line */
    .divline { animation: shimmer 3s ease-in-out infinite alternate 2.5s; }
    @keyframes shimmer {
      from { opacity: .25; }
      to   { opacity: .7;  }
    }
  </style>
</defs>

<!-- Background -->
<rect width="800" height="420" rx="14" class="bg"/>
<rect x="1" y="1" width="798" height="418" rx="13" fill="none" stroke="#FF2D55" stroke-width="1" opacity=".18"/>

